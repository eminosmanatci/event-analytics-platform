version: '3.8'

services:
  # PostgreSQL Veritabanı
  db:
    image: postgres:16-alpine
    container_name: event-analytics-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: event_analytics
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build: ./backend
    container_name: event-analytics-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/event_analytics
      APP_NAME: Event Analytics Platform
      DEBUG: "False"
      API_V1_PREFIX: /api/v1
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  # React Frontend
  frontend:
    build: ./frontend
    container_name: event-analytics-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: